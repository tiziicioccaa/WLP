<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WLP-SA | Consultoría</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --principal: #1a252f;
            --acento: #3498db;
            --gris: #f8f9fa;
            --blanco: #ffffff;
            --transicion: all 0.3s ease;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; margin: 0; color: #333; line-height: 1.6; scroll-behavior: smooth; overflow-x: hidden; }
        
        header { background: linear-gradient(135deg, var(--principal) 0%, #2c3e50 100%); color: white; padding: 0.5rem 0; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        nav { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: auto; padding: 0 20px; }
        .logo-nav img { height: 50px; width: auto; display: block; }
        .nav-links a { color: white; text-decoration: none; margin-left: 20px; font-size: 0.9rem; transition: var(--transicion); }
        .nav-links a:hover { color: var(--acento); }

        .hero { background-color: var(--gris); text-align: center; padding: 100px 20px; border-bottom: 1px solid #eee; }
        .hero h1 { font-size: 3rem; margin-bottom: 10px; color: var(--principal); font-weight: 700; }

        section { padding: 80px 20px; max-width: 1200px; margin: auto; }
        .titulo { text-align: center; margin-bottom: 50px; font-size: 2.2rem; }
        
        .grid-servicios { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); text-align: center; border-top: 4px solid var(--acento); transition: var(--transicion); }

        .grid-equipo { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 30px; }
        .integrante { text-align: center; background: var(--gris); padding: 40px 15px; border-radius: 15px; border: 1px solid #eee; transition: var(--transicion); }
        .foto-placeholder { width: 150px; height: 150px; border-radius: 50%; background: #ddd; margin: 0 auto 15px; border: 4px solid white; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .foto-placeholder img { width: 100%; height: 100%; object-fit: cover; }

        .contacto-container { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .form-grupo { margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
        .btn-enviar { background: var(--acento); color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; transition: var(--transicion); }

        /* --- FOTO GRUPAL TAMAÑO REDUCIDO --- */
        .seccion-foto-final {
            width: 100%;
            background-color: #000; /* Fondo negro para integrarse con la foto */
            display: flex;
            justify-content: center; /* Centrado horizontal */
            padding: 40px 0; /* Espaciado superior e inferior */
        }

        .foto-grupal-final { 
            width: 90%; /* Ancho responsivo */
            max-width: 1000px; /* Tamaño máximo limitado para que no sea muy grande */
            overflow: hidden;
            line-height: 0;
            border-radius: 15px; /* Bordes redondeados opcionales */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Sombra para dar profundidad */
        }

        .foto-grupal-final img { 
            width: 100%; 
            height: auto; /* Mantiene la proporción original */
            display: block;
            object-fit: contain; /* Asegura que la imagen se vea completa */
        }

        /* Footer */
        footer { background: var(--principal); color: white; text-align: center; padding: 40px 20px; }
        .footer-logo { height: 60px; margin-bottom: 20px; filter: brightness(0) invert(1); }
        
        @media (max-width: 768px) {
            .contacto-container { grid-template-columns: 1fr; }
            .hero h1 { font-size: 2.2rem; }
            .seccion-foto-final { padding: 20px 0; }
            .foto-grupal-final { max-width: 90%; } /* Un poco más pequeña en móviles */
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo-nav"><img src="logo.png" alt="WLP-SA Logo"></div>
            <div class="nav-links">
                <a href="#inicio">Inicio</a>
                <a href="#servicios">Servicios</a>
                <a href="#nosotros">Equipo</a>
                <a href="#contacto">Contacto</a>
            </div>
        </nav>
    </header>

    <section id="inicio" class="hero">
        <h1>Consultoría WLP-SA</h1>
        <p>Expertos en soluciones estratégicas y gestión integral.</p>
    </section>

    <section id="contacto">
        <h2 class="titulo">Contacto</h2>
        <div class="contacto-container">
            <div>
                <h3>¡Hablemos!</h3>
                <p><i class="fas fa-envelope"></i> contacto@wlp-sa.com</p>
                <p><i class="fas fa-phone"></i> +54 11 27114716</p>
            </div>
            <form id="contactForm">
                <div class="form-grupo"><input type="text" id="nombre" placeholder="Nombre" required></div>
                <div class="form-grupo"><input type="email" id="email" placeholder="Correo" required></div>
                <div class="form-grupo"><textarea id="mensaje" rows="4" placeholder="Tu mensaje..." required></textarea></div>
                <button type="submit" class="btn-enviar" id="btnEnviar">Enviar Consulta</button>
            </form>
        </div>
    </section>

    <div class="seccion-foto-final">
        <div class="foto-grupal-final">
            <img src="lospapus.jpg" alt="Equipo WLP-SA">
        </div>
    </div>

    <footer>
        <img src="logo.png" alt="WLP-SA" class="footer-logo">
        <p>WLP-SA &copy; 2026 - Todos los derechos reservados.</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Tu configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCfYI8vlLlmKaAs6p2mzUz8gC_x0WmySBY",
            authDomain: "wlp-sa.firebaseapp.com",
            projectId: "wlp-sa",
            storageBucket: "wlp-sa.firebasestorage.app",
            messagingSenderId: "1036928072152",
            appId: "1:1036928072152:web:68270fe9df0cec26b0daad",
            measurementId: "G-LZ1F3K7S17"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Lógica del Formulario
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "Enviando...";

            try {
                await addDoc(collection(db, "contactos"), {
                    nombre: document.getElementById('nombre').value,
                    email: document.getElementById('email').value,
                    mensaje: document.getElementById('mensaje').value,
                    fecha: new Date()
                });
                alert("¡Datos guardados con éxito!");
                document.getElementById('contactForm').reset();
            } catch (error) {
                alert("Error al conectar con el servidor.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Enviar Consulta";
            }
        });
    </script>
</body>
</html>
